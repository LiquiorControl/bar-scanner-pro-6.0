        /* --- TEMA "SPECTRUM" --- */
        :root { 
            --font-head: 'Outfit', sans-serif;
            --font-body: 'Outfit', sans-serif;
            --bg-body: #F3F6FB;
            --text-main: #1E2433;
            --text-soft: #6B7588;
            --card: #FFFFFF;
            --border-soft: #E7EBF2;

            --c-premium-1: #FBBF24; --c-premium-2: #D97706;
            --c-wells-1: #2DD4BF;   --c-wells-2: #0D9488;
            --c-seltzer-1: #38BDF8; --c-seltzer-2: #0284C7;
            --c-beers-1: #60A5FA;   --c-beers-2: #2563EB;
            --c-wines-1: #A78BFA;   --c-wines-2: #7C3AED;
            --c-nonalc-1: #94A3B8;  --c-nonalc-2: #475569;
        }

        body {
            background-color: var(--bg-body);
            background-image:
                radial-gradient(circle at 12% 8%, rgba(251,191,36,0.14) 0%, transparent 40%),
                radial-gradient(circle at 88% 14%, rgba(56,189,248,0.14) 0%, transparent 42%),
                radial-gradient(circle at 50% 95%, rgba(167,139,250,0.14) 0%, transparent 45%);
            background-attachment: fixed;
            color: var(--text-main);
            font-family: var(--font-body);
            min-height: 100vh;
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
        }
        h1, h2, h3, .impact-text { font-family: var(--font-head); letter-spacing: -0.01em; }

        .sticky-header-industrial {
            position: sticky;
            top: 0;
            z-index: 40;
            background-color: rgba(243,246,251,0.92);
            backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border-soft);
            box-shadow: 0 8px 24px -12px rgba(30,36,51,0.12);
        }

        .search-industrial { background-color: #F1F4F9; border: 1px solid var(--border-soft); color: var(--text-main); font-family: var(--font-body); font-weight: 600; border-radius: 1rem; }
        .search-industrial::placeholder { color: #A7B0C0; font-weight: 500; }

        .cat-block {
            width: 100%; padding: 1.25rem; text-align: left; margin-bottom: 0; border-radius: 1.25rem;
            font-family: var(--font-head); font-size: 1.3rem; font-weight: 700; line-height: 1.1; color: white;
            border: none; display: flex; flex-direction: column; justify-content: center;
            box-shadow: 0 14px 28px -14px rgba(30,36,51,0.35);
        }
        .cat-sub { background-color: rgba(255,255,255,0.22); color: white; font-family: var(--font-head); font-weight: 600; font-size: 0.7rem; letter-spacing: 0.05em; border-radius: 0.4rem; padding: 0.2rem 0.6rem; margin-top: 0.4rem; display: inline-block; width: fit-content; }
        .modal-industrial { background-color: var(--card); border: 1px solid var(--border-soft); color: var(--text-main); border-radius: 1.5rem; }
        #reader { border: 3px solid #2563EB !important; background: #000; border-radius: 1.25rem; overflow: hidden; }

        .bg-premium { background: linear-gradient(135deg, var(--c-premium-1), var(--c-premium-2)); }
        .bg-wells    { background: linear-gradient(135deg, var(--c-wells-1), var(--c-wells-2)); }
        .bg-seltzer  { background: linear-gradient(135deg, var(--c-seltzer-1), var(--c-seltzer-2)); }
        .bg-beers    { background: linear-gradient(135deg, var(--c-beers-1), var(--c-beers-2)); }
        .bg-wines    { background: linear-gradient(135deg, var(--c-wines-1), var(--c-wines-2)); }
        .bg-nonalc   { background: linear-gradient(135deg, var(--c-nonalc-1), var(--c-nonalc-2)); color: white !important; }

        .menu-backdrop { position: fixed; inset: 0; z-index: 45; background: rgba(30,36,51, 0.25); backdrop-filter: blur(3px); }
        .animate-in { animation: slideUp 0.2s ease-out; } @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
